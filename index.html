<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منصة تداول</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
      margin: 0;
    }

    header {
      background: #111a2e;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .box {
      background: #16233d;
      width: 320px;
      margin: 60px auto;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      width: 95%;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden { display: none; }

    .price {
      font-size: 28px;
      color: #00ff99;
      margin: 10px 0;
    }

    .red { background: #ff3d00 !important; }
  </style>
</head>

<body>

<header>📈 منصة تداول وهمي</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>تسجيل الدخول</h3>
  <input id="user" placeholder="اسم المستخدم">
  <input id="pass" type="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
</div>

<!-- PLATFORM -->
<div id="app" class="hidden">

  <div class="box">
    <div>سعر العملة</div>
    <div class="price" id="price">100</div>

    <button onclick="buy()">شراء</button>
    <button class="red" onclick="sell()">بيع</button>

    <p>الرصيد: <span id="balance">1000</span> $</p>
    <p>العملات: <span id="coins">0</span></p>
  </div>

</div>

<script>
let balance = 1000;
let coins = 0;
let price = 100;

// تسجيل دخول وهمي
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u && p) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } else {
    alert("دخل اسم وكلمة مرور");
  }
}

// حركة السعر
setInterval(() => {
  if (document.getElementById("app").classList.contains("hidden")) return;

  price += Math.floor(Math.random() * 10 - 5);
  if (price < 10) price = 10;

  document.getElementById("price").innerText = price;
}, 2000);

function buy() {
  if (balance >= price) {
    balance -= price;
    coins++;
    update();
  }
}

function sell() {
  if (coins > 0) {
    balance += price;
    coins--;
    update();
  }
}

function update() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("coins").innerText = coins;
}
</script>

</body>
</html>
