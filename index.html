<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منصة تداول</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
      margin: 0;
    }

    header {
      background: #111a2e;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .box {
      background: #16233d;
      width: 320px;
      margin: 60px auto;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      width: 95%;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<header>📈 منصة تداول</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>تسجيل / دخول</h3>
  <input id="user" placeholder="اسم المستخدم">
  <input id="pass" type="password" placeholder="كلمة المرور">

  <button onclick="signup()">إنشاء حساب</button>
  <button onclick="login()">دخول</button>
</div>

<!-- APP -->
<div id="app" class="box hidden">
  <h3>مرحباً 👋 <span id="name"></span></h3>
  <p>أنت الآن داخل المنصة</p>

  <button onclick="logout()">تسجيل خروج</button>
</div>

<script>
function signup() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if (!user || !pass) return alert("اكتب البيانات");

  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  alert("تم إنشاء الحساب");
}

function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if (user === savedUser && pass === savedPass) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("name").innerText = user;
  } else {
    alert("خطأ في البيانات");
  }
}

function logout() {
  location.reload();
}
</script>

</body>
</html>
